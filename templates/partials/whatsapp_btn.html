<style>
/* ── WhatsApp Floating Button ────────────────────────────── */
.wa-wrapper {
  position: fixed;
  bottom: 2rem;
  right: 2rem;
  z-index: 9999;

  /* Entrée depuis le bas au chargement */
  animation: waSlideIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  animation-delay: 1.2s;
  opacity: 0;
}

@keyframes waSlideIn {
  from { transform: translateY(80px) scale(0.6); opacity: 0; }
  to   { transform: translateY(0)    scale(1);   opacity: 1; }
}

/* Bouton principal */
.wa-btn {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  width: 3.5rem;
  height: 3.5rem;
  border-radius: 50%;
  background: #25D366;
  color: #fff;
  text-decoration: none;
  box-shadow: 0 4px 20px rgba(37, 211, 102, 0.45);
  transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1),
              box-shadow 0.25s ease;
}

.wa-btn:hover {
  transform: scale(1.12);
  box-shadow: 0 8px 30px rgba(37, 211, 102, 0.6);
}

.wa-btn:active {
  transform: scale(0.95);
}

/* Icône */
.wa-icon {
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  z-index: 2;
}

/* Pulse ring ─ animation de halo */
.wa-pulse {
  position: absolute;
  inset: 0;
  border-radius: 50%;
  background: #25D366;
  opacity: 0;
  animation: waPulse 2.4s ease-out infinite;
  animation-delay: 2s;   /* commence après l'entrée */
}

@keyframes waPulse {
  0%   { transform: scale(1);    opacity: 0.65; }
  70%  { transform: scale(1.75); opacity: 0; }
  100% { transform: scale(1.75); opacity: 0; }
}

/* Tooltip */
.wa-tooltip {
  position: absolute;
  right: calc(100% + 0.85rem);
  top: 50%;
  transform: translateY(-50%) translateX(8px);
  background: #0f1c2c;
  color: #fff;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.8rem;
  font-weight: 500;
  white-space: nowrap;
  padding: 0.45rem 0.85rem;
  border-radius: 0.5rem;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.2s ease, transform 0.2s ease;
  box-shadow: 0 4px 12px rgba(13, 27, 42, 0.2);
}

/* Flèche du tooltip */
.wa-tooltip::after {
  content: '';
  position: absolute;
  top: 50%;
  right: -6px;
  transform: translateY(-50%);
  border: 6px solid transparent;
  border-left-color: #0f1c2c;
  border-right: 0;
}

.wa-btn:hover .wa-tooltip {
  opacity: 1;
  transform: translateY(-50%) translateX(0);
}

/* Responsive mobile — plus petit, pas de tooltip */
@media (max-width: 640px) {
  .wa-wrapper {
    bottom: 1.25rem;
    right: 1.25rem;
  }
  .wa-btn {
    width: 3rem;
    height: 3rem;
  }
  .wa-btn svg {
    width: 23px;
    height: 23px;
  }
  .wa-tooltip {
    display: none;
  }
}

/* Respect prefer-reduced-motion */
@media (prefers-reduced-motion: reduce) {
  .wa-wrapper { animation: none; opacity: 1; }
  .wa-pulse   { animation: none; }
}
</style>
